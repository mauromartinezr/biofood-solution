# Solo API. PostgreSQL va en postgres/docker-compose.yml (make db-up).
# En el VPS: make db-up && make migrate-docker && make deploy-api

services:
  biofood-backend:
    build:
      context: .
      dockerfile: Dockerfile.api-only
    image: biofood-backend:latest
    container_name: biofood-backend
    ports:
      - "3001:3001"
    env_file:
      - .env.dev
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biofood

  migrate:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile.api-only
    env_file:
      - .env.dev
    command: ["./migrate"]
    networks:
      - biofood

networks:
  biofood:
    external: true
    name: biofood-net
