# Atajo desde la raíz del repo (misma definición que api/docker-compose.yml)
services:
  postgres3:
    image: postgres:15-alpine
    container_name: postgres3
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackathondb
      POSTGRES_USER: hackuser
      POSTGRES_PASSWORD: h4ckPass@549sSijfl_sD
    ports:
      - "5436:5432"
    volumes:
      - postgres3_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackuser -d hackathondb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biofood

  biofood-backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: biofood-backend:latest
    container_name: biofood-backend
    depends_on:
      postgres3:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - api/.env.dev
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biofood

networks:
  biofood:

volumes:
  postgres3_data:
