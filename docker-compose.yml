# Atajo desde la raíz del repo. PostgreSQL: make db-up

services:
  biofood-backend:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: biofood-backend:latest
    container_name: biofood-backend
    ports:
      - "3001:3001"
    env_file:
      - api/.env.dev
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biofood

networks:
  biofood:
    external: true
    name: biofood-net
