# Build desde la raíz del monorepo (necesita api/ + web/).
# PostgreSQL: make db-up (postgres/docker-compose.yml)

services:
  biofood-backend:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: biofood-backend:latest
    container_name: biofood-backend
    ports:
      - "3001:3001"
    env_file:
      - .env.dev
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biofood

  migrate:
    profiles: [tools]
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - .env.dev
    command: ["./migrate"]
    networks:
      - biofood

networks:
  biofood:
    external: true
    name: biofood-net
