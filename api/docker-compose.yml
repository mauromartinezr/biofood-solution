# Build desde la raíz del monorepo (necesita api/ + web/).
# Ejecutar: docker compose -f api/docker-compose.yml up --build -d
# O desde api/: docker compose up --build -d

services:
  biofood-backend:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: biofood-backend:latest
    container_name: biofood-backend

    ports:
      - "3001:3001"

    env_file:
      - .env.dev
    environment:
      - PORT=3001
      - DATABASE_DSN=/app/data/biofood.db

    volumes:
      - biofood-data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  biofood-data:
